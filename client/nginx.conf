server {
    listen 80;

    # Serve the React application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This allows React Router to handle the routes (prevents 404s on refresh)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to your backend Node.js server
    location /api/ {
        # Using the EC2 instance IP and port 5000 from your backend
        proxy_pass http://51.20.183.18:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}